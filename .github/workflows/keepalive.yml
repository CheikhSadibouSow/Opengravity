name: Keep alive Render

on:
  schedule:
    - cron: '*/10 * * * *' # S'exécute toutes les 10 minutes
  workflow_dispatch: # Permet de le lancer manuellement aussi

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: curl -s https://opengravity-4ewz.onrender.com > /dev/null
